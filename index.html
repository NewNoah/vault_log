<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="Log time spent in the vault during rocket alerts">
  <title>Vault Log</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ALERT — home screen: visit stats + "rocket alert" trigger -->
  <main id="screen-alert" class="screen active">
    <div class="header-box">vault_log_0_1</div>
    <div class="stats">
      <span>count</span> <span>today</span> <span id="stats-today">0</span>
      <span></span> <span>total</span> <span id="stats-total">0</span>
      <span>last enter</span> <span id="stats-date">—</span> <span id="stats-time">—</span>
    </div>
    <button id="btn-alert-ack" class="btn">rocket alert</button>
  </main>

  <!-- IDLE — alarm acknowledged, choose: go to vault or skip -->
  <main id="screen-idle" class="screen">
    <button id="btn-not-going" class="btn btn-muted">not going</button>
    <button id="btn-go-vault" class="btn">go to vault</button>
  </main>

  <!-- VAULT — inside vault, timer counting up inside header-box -->
  <main id="screen-vault" class="screen">
    <div class="header-box" id="timer-vault">00:00</div>
    <button id="btn-exit-vault" class="btn">exit vault</button>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>

</html>
